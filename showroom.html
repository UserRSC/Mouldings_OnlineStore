<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Showroom — Mouldings Online Store</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">Mouldings<span>Store</span></a>
      <nav class="main-nav" aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="showroom.html" class="active">Showroom</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ===== PAGE TITLE ===== -->
  <section class="page-hero">
    <div class="container">
      <h1>Our Showroom</h1>
      <p>Explore our complete range of mouldings, cornices, skirting boards, and more.</p>
    </div>
  </section>

  <!-- ===== FILTER BAR ===== -->
  <section class="section">
    <div class="container">
      <div class="filter-bar">
        <label for="category-filter">Filter by category:</label>
        <select id="category-filter">
          <option value="all">All</option>
        </select>
      </div>
      <div class="card-grid" id="product-grid">
        <!-- Populated dynamically by js/script.js -->
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> Mouldings Online Store. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
